<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="VIEWPORT" content="width=device-width,initial scale=1.0">
        <title>HEALTHY LIFE MEDICAL CENTRE</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <img src="logo.png" alt="HOSPITAL LOGO" class="logo">
<h1> HEALTHY LIFE MEDICAL CENTRE-PATIENT REGISTRATION FORM</h1>

<form>
    <label>PATIENT FULL NAME</label>
    <input type="text" placeholder="ENTRE EMAIL" required>

    <label>EMAIL ADRESS</label>
    <input type="email" placeholder="entre email" required>

    <label>password</label>
    <input type="password" placeholder="ENTRE PASSWORD" required>

    <label>DATE OF BITRH</label>
    <input type="date" required>

    <label>GENDER</label><br>
    <input type="radio" name="GENDER">MALE
    <input type="radio" name="GENDER">FEMALE
    <input type="radio" name="GENDER">OTHER
    <br><br>

    <label>MEDICAL CONDITIONS</label><br>
    <input type="checkbox">DIABETES<br>
    <input type="checkbox">HYPERTENSION<br>
    <input type="checkbox">ASTHMA<br>
    <input type="checkbox">NONE<br>
    <br><br>

    <label>DEPARTMENT</label>
    <select>
        <option>GENERAL MEDICENE</option>
        <option>PEDIATRICS</option>
        <option>DENTISTRY</option>
        <option>LABORATORY</option>
    </select>

    <label>COMMENTS</label>
    <textarea>rows="5" placeholder="ENTRE COMMENTS"</textarea> 
    
    <button type="submit">submit</button>
    <button type="reset">reset</button>

</form>
</div>

    </body>
</html>
